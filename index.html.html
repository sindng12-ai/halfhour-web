                <h2 class="story-headline reveal-up delay-1">기분 좋은 침묵 속,<br>오직 당신을 향한 집중.</h2>
                <div class="reveal-up delay-2">
                    <p class="story-paragraph">미용실 의자에 앉아 억지로 대화를 이어가야 했던 피로감. 분주하고 소란스러운 공간에서는 온전한 쉼도, 완벽한 스타일도 완성될 수 없습니다.</p>
                    <p class="story-paragraph">하프아워는 보이지 않는 '감정의 소모'를 지우고, 철저히 통제된 기분 좋은 침묵을 제안합니다. 아무것도 신경 쓸 필요 없는 프라이빗한 공간에서 <strong>오직 당신의 헤어에만 집중</strong>합니다.</p>
                    <p class="story-paragraph">처음부터 끝까지 흐트러짐 없이 이어지는 안심의 흐름. <strong>타협하지 않는 하프아워의 퀄리티</strong>를 마주하십시오.</p>
